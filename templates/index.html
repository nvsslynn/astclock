<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">

    <link rel="stylesheet" href="static/style.css">

    <title>*clock.</title>
</head>
<body class="bg-dark text-white h-100 d-flex flex-column">
    <header class="navbar navbar-light bg-light text-dark">
        <h1 class="mx-4"><span class="text-danger">*</span>clock.</h1>
    </header>

    <main class="d-flex flex-grow-1 align-items-center justify-content-center">
        <div class="container m-auto">
            <label for="houras" class="text-danger">Horas</label>
            <div id="houras" class="d-flex align-items-center justify-content-center bg-light text-dark mt-4 w-50 m-auto py-5 border-danger border border-5 rounded-pill display-4">
                {{ hour }}
            </div>
            
            <label for="minutos" class="text-danger">Minutos</label>
            <div id="minutos" class="d-flex align-items-center justify-content-center bg-light text-dark mt-4 w-50 m-auto py-5 border-danger border border-5 rounded-pill display-4">
                {{ min }}
            </div>
            
            <label for="secs" class="text-danger">Segundos</label>
            <div id="secs" class="d-flex align-items-center justify-content-center bg-light text-dark mt-4 w-50 m-auto py-5 border-danger border border-5 rounded-pill display-4">
                00
            </div>
        </div>
    </main>

    <script src="static/script.js"></script>
</body>
</html>
